<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 | Cell App</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: rgba(15, 23, 42, 0.5);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem;
            backdrop-filter: blur(20px);
        }
        .admin-content {
            padding: 3rem;
        }
        .sidebar-menu {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .menu-item {
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            color: var(--text-dim);
            font-weight: 500;
            transition: var(--transition);
        }
        .menu-item.active {
            background: var(--accent);
            color: var(--primary);
        }
        .menu-item:hover:not(.active) {
            background: rgba(45, 212, 191, 0.1);
            color: var(--accent);
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            padding: 1.5rem;
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        .stat-num {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 0.2rem;
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-dim);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        th, td {
            padding: 1.2rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        th {
            background: rgba(15, 23, 42, 0.5);
            color: var(--accent);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .status-pill {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-active { background: rgba(45, 212, 191, 0.1); color: var(--accent); }
    </style>
</head>
<body style="background: var(--primary);">

    <div class="admin-layout">
        <aside class="sidebar">
            <a href="index.html" class="brand" style="font-size: 1.4rem;">sell<span>app</span></a>
            <nav class="sidebar-menu">
                <a href="#" class="menu-item active">대시보드</a>
                <a href="#" class="menu-item">아이디어 관리</a>
                <a href="#" class="menu-item">회원 관리</a>
                <a href="#" class="menu-item">거래 내역</a>
                <a href="#" class="menu-item">정산 센터</a>
                <a href="#" class="menu-item">설정</a>
            </nav>
        </aside>

        <main class="admin-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
                <h2>플랫폼 현황 요약</h2>
                <div style="color: var(--text-dim); font-size: 0.9rem;">최종 업데이트: 2026.04.02 23:25</div>
            </header>

            <div class="stat-grid">
                <div class="stat-card">
                    <div class="stat-num">158</div>
                    <div class="stat-label">누적 등록 아이디어</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num">1,240</div>
                    <div class="stat-label">활성 회원수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num">42</div>
                    <div class="stat-label">이번 달 성사 건수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num">₩1.2B</div>
                    <div class="stat-label">누적 거래액</div>
                </div>
            </div>

            <h3>최근 등록된 아이디어</h3>
            <table style="margin-top: 1.5rem;">
                <thead>
                    <tr>
                        <th>제품명</th>
                        <th>카테고리</th>
                        <th>희망 금액</th>
                        <th>판매자</th>
                        <th>상태</th>
                        <th>관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>드림플러스</td>
                        <td>기업 컨설팅</td>
                        <td>협의</td>
                        <td>하맘 파트너</td>
                        <td><span class="status-pill status-active">노출중</span></td>
                        <td><button style="background:none; border:none; color:var(--text-dim); cursor:pointer;">편집</button></td>
                    </tr>
                    <tr>
                        <td>하스놀 브랜드 페이지</td>
                        <td>커스텀 웹</td>
                        <td>협의</td>
                        <td>하맘 파트너</td>
                        <td><span class="status-pill status-active">노출중</span></td>
                        <td><button style="background:none; border:none; color:var(--text-dim); cursor:pointer;">편집</button></td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

</body>
</html>
